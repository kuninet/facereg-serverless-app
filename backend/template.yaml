AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  facereg-serverless-app
  Backend infrastructure for Face Registration App.

Parameters:
  AdminAuthCredentials:
    Type: String
    NoEcho: true
    Description: 管理画面API用のBasic認証情報。user:password形式、複数はカンマ区切り。
  UploadTokenSecret:
    Type: String
    NoEcho: true
    Description: 受付画面のアップロード完了トークン署名に使う秘密値。

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Tracing: PassThrough
    Environment:
        Variables:
          TABLE_NAME: !Ref EntriesTable
          PHOTO_BUCKET_NAME: !Ref PhotosBucket
          UPLOAD_TOKEN_SECRET: !Ref UploadTokenSecret
  Api:
    TracingEnabled: false
    # CORS はCloudFront経由の同一オリジンアクセスのため不要
    # カスタムドメイン対応時に必要に応じて再設定

Resources:
  # -------------------------------------------------------------------
  # 1. DynamoDB Table (受付データ保管用)
  # -------------------------------------------------------------------
  EntriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: facereg-entries-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # -------------------------------------------------------------------
  # 2. S3 Bucket (顔写真保管用)
  # -------------------------------------------------------------------
  PhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "facereg-photos-${AWS::AccountId}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - POST
            AllowedOrigins:
              - "*" # 本番ではフロントエンドドメインに制限
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: AutoDeletePhotosAfter7Days
            Status: Enabled
            ExpirationInDays: 7 # アップロードから7日後に自動削除

  # -------------------------------------------------------------------
  # 3. HTTP API (API Gateway)
  # -------------------------------------------------------------------
  FaceregApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Auth:
        Authorizers:
          AdminApiAuthorizer:
            FunctionArn: !GetAtt AdminAuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 0

  # -------------------------------------------------------------------
  # 4. Lambda Functions (APIの裏側)
  # -------------------------------------------------------------------
  AdminAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/
      Handler: app.authorize
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Environment:
        Variables:
          ADMIN_AUTH_CREDENTIALS: !Ref AdminAuthCredentials

  AdminAuthorizerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AdminAuthorizerFunction}"
      RetentionInDays: 7

  InitializeUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/entries/
      Handler: app.initializeUpload
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Policies:
        - S3WritePolicy:
            BucketName: !Ref PhotosBucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObjectAcl
              Resource: !Sub "arn:aws:s3:::${PhotosBucket}/*"
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /entries/initialize
            Method: post
            RestApiId: !Ref FaceregApi

  InitializeUploadLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${InitializeUploadFunction}"
      RetentionInDays: 7
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  RegisterEntryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/entries/
      Handler: app.registerEntry
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EntriesTable
        - S3ReadPolicy:
            BucketName: !Ref PhotosBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /entries
            Method: post
            RestApiId: !Ref FaceregApi

  RegisterEntryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${RegisterEntryFunction}"
      RetentionInDays: 7
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  ListEntriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/admin/
      Handler: app.listEntries
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EntriesTable
        - S3ReadPolicy:
            BucketName: !Ref PhotosBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/entries
            Method: get
            RestApiId: !Ref FaceregApi
            Auth:
              Authorizer: AdminApiAuthorizer

  ListEntriesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ListEntriesFunction}"
      RetentionInDays: 7
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  BulkDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/admin/
      Handler: app.bulkDelete
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EntriesTable
        - S3CrudPolicy:
            BucketName: !Ref PhotosBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/entries/bulk-delete
            Method: post
            RestApiId: !Ref FaceregApi
            Auth:
              Authorizer: AdminApiAuthorizer

  BulkDeleteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${BulkDeleteFunction}"
      RetentionInDays: 7
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  # -------------------------------------------------------------------
  # 5. フロントエンド配信用 S3 Bucket
  # -------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "facereg-frontend-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Project
          Value: facereg-app

  # CloudFront から S3 へのアクセスを許可するバケットポリシー
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # -------------------------------------------------------------------
  # 6. CloudFront Distribution (フロントエンド + API)
  # -------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "facereg-oac-${AWS::StackName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: "Facereg App - Frontend + API"
        Origins:
          # フロントエンド（S3）
          - Id: S3FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          # バックエンドAPI（API Gateway）
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${FaceregApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: "658327ea-f89d-4fab-a63d-7e88639e58f6" # CachingOptimized
          Compress: true
        CacheBehaviors:
          # /v1/* パスは API Gateway へプロキシ
          - PathPattern: "/v1/*"
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad" # CachingDisabled
            OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac" # AllViewerExceptHostHeader
        # SPA用: 404時にindex.htmlを返す
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Project
          Value: facereg-app

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${FaceregApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
  PhotosBucketName:
    Description: "S3 Bucket for Photos"
    Value: !Ref PhotosBucket
  EntriesTableName:
    Description: "DynamoDB Table for Entries"
    Value: !Ref EntriesTable
  FrontendBucketName:
    Description: "S3 Bucket for Frontend"
    Value: !Ref FrontendBucket
  CloudFrontURL:
    Description: "CloudFront Distribution URL"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref CloudFrontDistribution
